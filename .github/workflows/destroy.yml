name: Destroy Environment

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Environment
        required: true
        type: choice
        options: [dev, test, prod]
      confirm:
        description: Type environment name
        required: true

permissions:
  id-token: write
  contents: read

jobs:
  destroy:
    runs-on: ubuntu-latest
    steps:
      - name: Validate confirmation
        run: |
          [ "${{ github.event.inputs.environment }}" = "${{ github.event.inputs.confirm }}" ]
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.DEFAULT_AWS_REGION || vars.DEFAULT_AWS_REGION || 'us-east-1' }}
      - uses: hashicorp/setup-terraform@v3
      - name: Destroy
        run: |
          chmod +x scripts/destroy.sh
          ./scripts/destroy.sh ${{ github.event.inputs.environment }}
